    <rect class="px" x="0" y="0" width="200" height="200" fill="#F8E098"/>
    <rect class="px" x="200" y="0" width="200" height="200" fill="#88C8E8"/>
    <rect class="px" x="400" y="0" width="200" height="200" fill="#F8E098"/>
    <rect class="px" x="600" y="0" width="200" height="200" fill="#88C8E8"/>
    <rect class="px" x="800" y="0" width="200" height="200" fill="#A85820"/>
    <rect class="px" x="1000" y="0" width="200" height="200" fill="#FCFCFC"/>
    <rect class="px" x="1200" y="0" width="200" height="200" fill="#A85820"/>
    <rect class="px" x="1400" y="0" width="200" height="200" fill="#FCFCFC"/>
    <rect class="px" x="0" y="200" width="200" height="200" fill="#0070D8"/>
    <rect class="px" x="200" y="200" width="200" height="200" fill="#F8C040"/>
    <rect class="px" x="400" y="200" width="200" height="200" fill="#0070D8"/>
    <rect class="px" x="600" y="200" width="200" height="200" fill="#F8C040"/>
    <rect class="px" x="800" y="200" width="200" height="200" fill="#88C8E8"/>
    <rect class="px" x="1000" y="200" width="200" height="200" fill="#E83020"/>
    <rect class="px" x="1200" y="200" width="200" height="200" fill="#48B048"/>
    <rect class="px" x="1400" y="200" width="200" height="200" fill="#E83020"/>
    <rect class="px" x="0" y="400" width="200" height="200" fill="#F8C040"/>
    <rect class="px" x="200" y="400" width="200" height="200" fill="#0070D8"/>
    <rect class="px" x="400" y="400" width="200" height="200" fill="#F8C040"/>
    <rect class="px" x="600" y="400" width="200" height="200" fill="#0070D8"/>
    <rect class="px" x="800" y="400" width="200" height="200" fill="#E83020"/>
    <rect class="px" x="1000" y="400" width="200" height="200" fill="#48B048"/>
    <rect class="px" x="1200" y="400" width="200" height="200" fill="#E83020"/>
    <rect class="px" x="1400" y="400" width="200" height="200" fill="#48B048"/>
    <rect class="px" x="0" y="600" width="200" height="200" fill="#FCFCFC"/>
