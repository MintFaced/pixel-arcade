    <rect class="px" x="400" y="600" width="200" height="200" fill="#88C8E8"/>
    <rect class="px" x="600" y="600" width="200" height="200" fill="#F8E098"/>
    <rect class="px" x="800" y="600" width="200" height="200" fill="#48B048"/>
    <rect class="px" x="1000" y="600" width="200" height="200" fill="#A85820"/>
    <rect class="px" x="1200" y="600" width="200" height="200" fill="#FCFCFC"/>
    <rect class="px" x="1400" y="600" width="200" height="200" fill="#A85820"/>
  </g>

  <!-- Scrolling scanlines -->
  <g class="scanlines">
    <rect x="0" y="-8" width="1600" height="816" fill="url(#scanPattern)"/>
  </g>

  <!-- Slow phosphor sweep band -->
  <g class="sweep">
    <rect x="0" y="0" width="1600" height="200" fill="rgba(255,255,255,0.06)"/>
  </g>

  <!-- Magenta rim glow -->
  <rect class="rim" width="1600" height="800" fill="url(#rim)"/>

  <!-- Vignette -->
  <rect class="vignette" width="1600" height="800" fill="url(#vig)"/>
</svg>
